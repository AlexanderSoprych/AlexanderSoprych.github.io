<!DOCTYPE html>
<html lang="en">
<head>

</head>
<style>
.hero {
background-color: #BF8552FF;
width: 100%;
height: 80vh;
display: flex;
}
.backgroundTitle{
color: rgb(145, 100, 60);
font-size: 7.5vw;
text-align: left;
position: absolute;
margin: 0;
left: 2vh;
top: 10px;
z-index: 0;
}
.informationalText {
color: #543E21;
font-size: 3vw;
text-align: right;
position: absolute;
font-family: monaco, Consolas, "Lucida Console", monospace;
padding-right: 1vw;
margin-left: 50vw;
left: 2vh;
top: 0;
z-index: 0;
}
.instructionalText {
color: seashell;
font-size: .75vw;
text-align: right;
position: absolute;
font-family: monaco, Consolas, "Lucida Console", monospace;
padding-right: .5vw;
left: 87.5vw;
top: 70vh;
margin: 0;
z-index: 2;
}
model-viewer {
  width: 100%;
  height: 80vh;
  position: absolute;
  /*opacity: 0.5;*/
  z-index: 1;
}
img {max-width: 100%; height: auto;}

@media screen and (max-width : 720px) {
  .backgroundTitle{font-size: 50px;}
  .informationalText {font-size: 2vh; margin-left: 25vw; left: 1vw; top: 7.5%;}
  .instructionalText {font-size: 1vh; left: 60vw; right: 10px;}
}
</style>
<body>
    <div class="hero">
      <model-viewer src="../Media/Assets/Desert_Tigers_Test.glb" camera-controls tone-mapping="neutral" poster="../Media/Renders/Desert_Tigers/Desert_Tigers_Poster.png" shadow-intensity="1.25" exposure="1" shadow-softness="1" camera-orbit="40deg 70deg 22.5m" field-of-view="25deg">
        <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
        </div>
      </model-viewer>
        <h1 class="backgroundTitle">Desert Tigers</h1>
        <h2 class="informationalText">A lower-poly 3D scene demonstrating how just the proper use of color can evoke feeling irrespective of texture quality.</h2>
        <h5 class="instructionalText">Left-click and drag to orbit.<br>Right-click and drag to pan.<br>Scroll up or down to zoom.</h5>
    </div>

<div class="header" id="signatureMenu">
  <h2>
    <a href="../Pages/OLD/index.html"><span class="textWhite">Alexander Soprych</a></span>
    <a href="../Pages/OLD/index.html"><span class="textBlack">Alexander Soprych</a></span>
  </h2>
</div>

<section class="spacer"></section>

  <picture>
	  <source media="(max-width: 720px)"srcset="../Media/Renders/Desert_Tigers/Desert_Tigers_Mobile.png">
      <img src="../Media/Renders/Desert_Tigers/Desert_Tigers_01.png" alt="Desert Tigers">
	</picture>

<section class="spacer"></section>

<section class="comparisonSection">
  <div class="comparisonImage beforeImage">
    <picture>
	<source media="(max-width: 720px)"srcset="../Media/Renders/Desert_Tigers/Desert_Tigers_Mobile.png">
	<img src="../Media/Renders/Desert_Tigers/Desert_Tigers_01.png" alt="Normal">
	</picture>
  </div>
    </div>
  <div class="comparisonImage afterImage">
	<picture>
	<source media="(max-width: 720px)"srcset="../Media/Renders/Desert_Tigers/Desert_Tigers_Mobile_Wireframe.png">
    <img src="../Media/Renders/Desert_Tigers/Desert_Tigers_Wireframe.png" alt="Wireframe">
	</picture>
  </div>
</section>

</body>

<!-- GSAP Libraries //-->

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>

<!-- GSAP Scripts //-->

<script>
gsap.utils.toArray(".comparisonSection").forEach(section => {
	let tl = gsap.timeline({
			scrollTrigger: {
				trigger: section,
				start: "center center",
				end: () => "+=" + section.offsetWidth,
				scrub: true,
				pin: true,
        		anticipatePin: 1
			},
			defaults: {ease: "none"}
		});
	tl.fromTo(section.querySelector(".afterImage"), { xPercent: 100, x: 0}, {xPercent: 0})
	  .fromTo(section.querySelector(".afterImage img"), {xPercent: -100, x: 0}, {xPercent: 0}, 0);
});

</script>

<!-- Model Viewer Script //-->

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

<!-- GSAP Libraries //-->

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>

<script>
var hh = document.querySelector(".header").offsetHeight;

let tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".header",
    start: "top top",
    invalidateOnRefresh: true,
    pin: false,
    pinSpacing: false
  }
});

gsap.fromTo(
  ".textWhite",
  {
    clipPath: "polygon(0% 100%, 100% 100%, 100% 100%, 0% 100%)"
  },
  {
    scrollTrigger: {
      trigger: none,
      scrub: true,

      start: () => "top top+=" + document.querySelector(".header").offsetHeight,
      end: () => '+=' + document.querySelector(".header").offsetHeight,
      
      id: "text-white",
      markers: true,
      invalidateOnRefresh: true
    },
    clipPath: "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)",
    ease: 'none'
  }
);

</script>
